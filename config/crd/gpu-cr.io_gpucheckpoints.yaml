apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gpucheckpoints.gpu-cr.io
spec:
  group: gpu-cr.io
  names:
    kind: GPUCheckpoint
    listKind: GPUCheckpointList
    plural: gpucheckpoints
    singular: gpucheckpoint
    shortNames:
      - gpuckpt
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Workload
          type: string
          jsonPath: .spec.workloadRef.name
        - name: Node
          type: string
          jsonPath: .status.observedNode
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Count
          type: integer
          jsonPath: .status.checkpointCount
        - name: Last
          type: date
          jsonPath: .status.lastCheckpointTime
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [workloadRef, storage]
              properties:
                workloadRef:
                  type: object
                  required: [namespace, name]
                  properties:
                    kind:
                      type: string
                      enum: [Pod, Deployment, StatefulSet]
                      default: Pod
                    namespace:
                      type: string
                    name:
                      type: string
                    container:
                      type: string
                    nodeInfo:
                      type: string
                storage:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [hostPath, mount, nfs, pvc, s3]
                      default: hostPath
                    path:
                      type: string
                    endpoint:
                      type: string
                    fsType:
                      type: string
                    source:
                      type: string
                    options:
                      type: string
                    subPath:
                      type: string
                    claimName:
                      type: string
                schedule:
                  type: string
                  description: >-
                    Checkpoint interval as a Go duration string
                    (e.g. "30s", "5m", "1h"). Empty = one-shot.
                incremental:
                  type: boolean
                  default: false
            status:
              type: object
              properties:
                phase:
                  type: string
                observedNode:
                  type: string
                lastCheckpointTime:
                  type: string
                  format: date-time
                checkpointCount:
                  type: integer
                  format: int64
                lastCheckpointPath:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
