# GPU C/R Node Agent — GCR interception + CRIUgpu (CRI-O).
# Pipeline: the in-Pod interceptor does the Selective Interception DATA checkpoint
# (LD_PRELOAD), and the agent calls the kubelet Checkpoint API so CRI-O/CRIU +
# the NVIDIA cuda_plugin checkpoint the GPU CONTROL STATE together with the CPU
# process. No host cuda-checkpoint helper.
#   - hostNetwork so the agent can reach the local kubelet (127.0.0.1:10250)
#   - metrics/health on :9290/:9291 (8080/8081 collide under hostNetwork)
# Set `image:` to your registry tag before applying.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-cr-node-agent
  namespace: gpu-cr-system
  labels:
    app.kubernetes.io/name: gpu-cr-node-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-cr-node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-cr-node-agent
    spec:
      serviceAccountName: gpu-cr-node-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-agent
          image: docker.io/jeongseungjun/gpu-cr-node-agent:latest
          imagePullPolicy: Always
          args:
            - --kubelet-url=https://127.0.0.1:10250
            - --kubelet-insecure=true
            - --kubelet-timeout=30m
            - --host-lib-dir=/host/gpu-cr/lib
            - --host-run-dir=/host/gpu-cr/run
            - --interceptor-dist-dir=/opt/gpu-cr-dist
            - --dry-run=false
            - --metrics-bind-address=:9290
            - --health-probe-bind-address=:9291
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            # Interceptor library dir + GCR control channels shared with GPU Pods.
            - name: gpu-cr-host
              mountPath: /host/gpu-cr
            # kubelet writes the CRIUgpu checkpoint tar here; the agent reads it.
            - name: kubelet-checkpoints
              mountPath: /var/lib/kubelet/checkpoints
            # Checkpoint output dir — MUST match .spec.storage.path in your CRs.
            - name: gcr-checkpoint
              mountPath: /var/lib/gcr-checkpoint
            # per-Pod GCR data blobs (GPU data offload); agent persists them beside the tar
            - name: gcr-data
              mountPath: /var/lib/gcr-data
          ports:
            - name: metrics
              containerPort: 9290
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9291
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9291
            initialDelaySeconds: 10
      volumes:
        - name: gpu-cr-host
          hostPath:
            path: /var/lib/gpu-cr
            type: DirectoryOrCreate
        - name: kubelet-checkpoints
          hostPath:
            path: /var/lib/kubelet/checkpoints
            type: DirectoryOrCreate
        - name: gcr-checkpoint
          hostPath:
            path: /var/lib/gcr-checkpoint
            type: DirectoryOrCreate
        - name: gcr-data
          hostPath:
            path: /var/lib/gcr-data
            type: DirectoryOrCreate
