# GPU C/R Node Agent — CRIUgpu variant (CRI-O + CRIU + NVIDIA cuda_plugin).
# The agent only orchestrates: it watches GPUCheckpoint CRs and calls the kubelet
# checkpoint API, which drives CRI-O/CRIU (with the cuda_plugin) to checkpoint the
# container (CPU + GPU) into a tar; the agent then stores it. No in-Pod interceptor
# and no host cuda-checkpoint helper are needed.
#   - hostNetwork so the agent can reach the local kubelet (127.0.0.1:10250)
#   - metrics/health on :9290/:9291 (8080/8081 collide under hostNetwork)
# Set `image:` to your registry tag before applying.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-cr-node-agent
  namespace: gpu-cr-system
  labels:
    app.kubernetes.io/name: gpu-cr-node-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-cr-node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-cr-node-agent
    spec:
      serviceAccountName: gpu-cr-node-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-agent
          # Reused tag while iterating -> imagePullPolicy: Always so the node
          # always pulls the freshly rebuilt image.
          image: docker.io/jeongseungjun/gpu-cr-node-agent:latest
          imagePullPolicy: Always
          args:
            - --kubelet-url=https://127.0.0.1:10250
            - --kubelet-insecure=true
            - --dry-run=false
            - --metrics-bind-address=:9290
            - --health-probe-bind-address=:9291
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            # kubelet writes the checkpoint tar here; the agent reads it.
            - name: kubelet-checkpoints
              mountPath: /var/lib/kubelet/checkpoints
            # Checkpoint output dir — MUST match .spec.storage.path in your CRs.
            - name: gcr-checkpoint
              mountPath: /var/lib/gcr-checkpoint
          ports:
            - name: metrics
              containerPort: 9290
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9291
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9291
            initialDelaySeconds: 10
      volumes:
        - name: kubelet-checkpoints
          hostPath:
            path: /var/lib/kubelet/checkpoints
            type: DirectoryOrCreate
        - name: gcr-checkpoint
          hostPath:
            path: /var/lib/gcr-checkpoint
            type: DirectoryOrCreate
