apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-cr-node-agent
  namespace: gpu-cr-system
  labels:
    app.kubernetes.io/name: gpu-cr-node-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-cr-node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-cr-node-agent
    spec:
      serviceAccountName: gpu-cr-node-agent
      # hostPID: operate on container host PIDs (cuda-checkpoint --pid).
      # hostNetwork: reach the local kubelet at https://127.0.0.1:10250.
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Schedule onto GPU nodes only; adjust to your cluster's labels.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-agent
          image: ghcr.io/gprojectdev/gpu-cr-node-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            - --kubelet-url=https://127.0.0.1:10250
            - --kubelet-insecure=true
            - --host-lib-dir=/host/gpu-cr/lib
            - --host-run-dir=/host/gpu-cr/run
            - --interceptor-dist-dir=/opt/gpu-cr-dist
            # Set --dry-run=true on clusters without GPUs / cuda-checkpoint.
            - --dry-run=false
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # CRI endpoint used by crictl for container PID resolution.
            #   containerd (default): unix:///run/containerd/containerd.sock
            #   CRI-O:                unix:///var/run/crio/crio.sock
            # Must match the `cri-sock` volume path below.
            - name: CONTAINER_RUNTIME_ENDPOINT
              value: unix:///run/containerd/containerd.sock
            # Path to the host cuda-checkpoint binary (mounted via host-usr-bin).
            - name: CUDA_CHECKPOINT_BIN
              value: /host/usr/bin/cuda-checkpoint
            # cuda-checkpoint dynamically links libcuda.so.1 (the host NVIDIA
            # driver lib), absent from the agent image; expose it via LD_LIBRARY_PATH.
            - name: LD_LIBRARY_PATH
              value: /host/usr/lib/x86_64-linux-gnu
          securityContext:
            privileged: true
          volumeMounts:
            # Host dir exposed to GPU Pods as the interceptor library source.
            - name: gpu-cr-host
              mountPath: /host/gpu-cr
            # cuda-checkpoint binary + driver libs from the host.
            - name: host-usr-bin
              mountPath: /host/usr/bin
              readOnly: true
            # Host NVIDIA driver libraries (libcuda.so.1) for cuda-checkpoint.
            - name: host-usr-lib
              mountPath: /host/usr/lib/x86_64-linux-gnu
              readOnly: true
            # kubelet checkpoint archives.
            - name: kubelet-checkpoints
              mountPath: /var/lib/kubelet/checkpoints
            # Checkpoint output dir — MUST match .spec.storage.path in your
            # GPUCheckpoint CRs so the archive persists on the node / shared FS.
            - name: gcr-checkpoint
              mountPath: /var/lib/gcr-checkpoint
            # CRI socket for crictl PID resolution.
            #   containerd: /run/containerd/containerd.sock
            #   CRI-O:      /var/run/crio/crio.sock  (change all 3 socket refs together)
            - name: cri-sock
              mountPath: /run/containerd/containerd.sock
          ports:
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
      volumes:
        - name: gpu-cr-host
          hostPath:
            path: /var/lib/gpu-cr
            type: DirectoryOrCreate
        - name: host-usr-bin
          hostPath:
            path: /usr/bin
            type: Directory
        - name: host-usr-lib
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
            type: Directory
        - name: kubelet-checkpoints
          hostPath:
            path: /var/lib/kubelet/checkpoints
            type: DirectoryOrCreate
        - name: gcr-checkpoint
          hostPath:
            path: /var/lib/gcr-checkpoint
            type: DirectoryOrCreate
        - name: cri-sock
          hostPath:
            # containerd default; for CRI-O use /var/run/crio/crio.sock
            path: /run/containerd/containerd.sock
            type: Socket
