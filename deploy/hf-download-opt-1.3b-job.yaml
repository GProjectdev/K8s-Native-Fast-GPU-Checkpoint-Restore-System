# One-off Job: download facebook/opt-1.3b into the NFS share so GPU pods can load it
# locally (no runtime HuggingFace dependency). Runs in a small python container that
# mounts 10.178.0.15:/mnt/nfs and writes to /mnt/nfs/models/opt-1.3b. No host installs.
#
# HF's public Xet CDN currently 403s, so a token is needed:
#   kubectl create secret generic hf-token -n default --from-literal=token=hf_xxxx   # only if public 403s
#   kubectl apply -f deploy/hf-download-opt-1.3b-job.yaml
#   kubectl logs -f job/hf-download-opt-1-3b
apiVersion: batch/v1
kind: Job
metadata:
  name: hf-download-opt-1-3b
  namespace: default
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: dl
          image: python:3.11-slim
          env:
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: HF_HUB_DOWNLOAD_TIMEOUT, value: "60" }
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef: { name: hf-token, key: token, optional: true }
          command: ["bash","-lc"]
          args:
            - |
              set -e
              pip -q install -U "huggingface_hub"
              echo "downloading facebook/opt-1.3b (PyTorch files only) -> /out/models/opt-1.3b ..."
              # Only PyTorch + config + tokenizer; skip tf_model.h5 / flax_model.msgpack
              # (not needed and currently 403 on HF's Xet CDN). Retry — Xet 403s are flaky.
              ok=0
              for i in 1 2 3 4 5 6; do
                if hf download facebook/opt-1.3b --local-dir /out/models/opt-1.3b                      --include "*.json" "*.bin" "*.txt" "*.model"; then ok=1; break; fi
                echo "[retry $i] Xet flaked; resuming in 5s..."; sleep 5
              done
              echo "=== files ==="; ls -lh /out/models/opt-1.3b
              test -f /out/models/opt-1.3b/pytorch_model.bin && echo "OK: pytorch_model.bin present" \
                || { echo "MISSING pytorch_model.bin (ok=$ok)"; exit 1; }
          volumeMounts:
            - { name: nfs, mountPath: /out }
      volumes:
        - name: nfs
          nfs: { server: 10.178.0.15, path: /mnt/nfs }
