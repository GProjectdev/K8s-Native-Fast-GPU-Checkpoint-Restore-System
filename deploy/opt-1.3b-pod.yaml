# facebook/opt-1.3b GPU workload wired for the GCR data engine (Selective Interception).
# cudaMalloc is served by the LD_PRELOAD interceptor (VMM-backed), so on checkpoint the
# model is offloaded to an external blob and the physical GPU memory is freed; CRIUgpu
# then checkpoints CPU + GPU control state. Loads the model, warms up, prints READY, idles.
#
#   kubectl apply -f deploy/opt-1.3b-pod.yaml
#   kubectl logs opt-1-3b -f        # wait for the READY line
apiVersion: v1
kind: Pod
metadata:
  name: opt-1-3b
  namespace: default
  labels: { app: opt-1-3b }
spec:
  nodeSelector: { nvidia.com/gpu.present: "true" }
  restartPolicy: Never
  containers:
    - name: cuda-app
      image: pytorch/pytorch:2.6.0-cuda12.4-cudnn9-runtime
      env:
        - { name: MODEL, value: "facebook/opt-1.3b" }
        - { name: HF_HOME, value: /root/.cache/huggingface }
        # Download robustness: force the classic (non-Xet) path; the Xet CDN can hang
        # and leave only metadata downloaded (weights stall). Optionally set HF_TOKEN.
        - { name: HF_HUB_DISABLE_XET, value: "1" }
        - { name: HF_HUB_DOWNLOAD_TIMEOUT, value: "60" }
        # - { name: HF_TOKEN, value: "hf_xxx" }
        # --- GCR interceptor (data engine) ---
        - { name: GCR_VMM_ALLOC, value: "1" }
        - { name: LD_PRELOAD, value: /opt/gpu-cr/libgcr-interceptor.so }
        - { name: GCR_HOME, value: /opt/gpu-cr }
        - name: GCR_POD_UID
          valueFrom: { fieldRef: { fieldPath: metadata.uid } }
        - { name: GCR_CONTROL_DIR, value: /var/lib/gpu-cr/run }
        - { name: GCR_DATA_DIR, value: /var/lib/gcr-data }   # host-visible; put on tmpfs for speed
      command: ["bash","-lc"]
      args:
        - |
          set -e
          pip -q install "transformers>=4.44" accelerate sentencepiece >/dev/null 2>&1 || true
          python - <<'PY'
          import os, time, torch
          from transformers import AutoModelForCausalLM, AutoTokenizer
          m = os.environ.get("MODEL", "facebook/opt-1.3b")
          tok = AutoTokenizer.from_pretrained(m)
          model = AutoModelForCausalLM.from_pretrained(m, torch_dtype=torch.float16).cuda().eval()
          ids = tok("Hello, world. Tell me about GPUs.", return_tensors="pt").input_ids.cuda()
          with torch.no_grad():
              for _ in range(3):
                  model.generate(ids, max_new_tokens=32)   # warmup: allocate KV/activations
          torch.cuda.synchronize()
          try:
              from huggingface_hub.utils import _http; _http.get_session().close()  # drop HF keep-alive socket
          except Exception:
              pass
          import gc; gc.collect()
          print("READY framework=pytorch model=%s gpu_alloc=%.0fMiB" % (m, torch.cuda.memory_allocated()/2**20), flush=True)
          while True:
              time.sleep(3600)
          PY
      resources: { limits: { nvidia.com/gpu: "1" } }
      volumeMounts:
        - { name: gpu-cr-lib, mountPath: /opt/gpu-cr, readOnly: true }
        - { name: gpu-cr-run, mountPath: /var/lib/gpu-cr/run }
        - { name: gcr-data,   mountPath: /var/lib/gcr-data }
  volumes:
    - name: gpu-cr-lib
      hostPath: { path: /var/lib/gpu-cr/lib, type: Directory }
    - name: gpu-cr-run
      hostPath: { path: /var/lib/gpu-cr/run, type: DirectoryOrCreate }
    - name: gcr-data
      hostPath: { path: /var/lib/gcr-data, type: DirectoryOrCreate }
