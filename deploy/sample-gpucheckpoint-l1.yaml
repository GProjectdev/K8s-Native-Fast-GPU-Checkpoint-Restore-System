# Checkpoint request for the Level 1 test pod.
apiVersion: gpu-cr.io/v1alpha1
kind: GPUCheckpoint
metadata:
  name: ckpt-l1-001
  namespace: default
spec:
  podRef:
    namespace: default
    name: cuda-l1-pod
    container: cuda-app
  storage:
    type: hostPath
    path: /var/lib/gcr-checkpoint
  period: "000000"
