# Checkpoint request for the paper-matched vLLM Pod.
apiVersion: gpu-cr.io/v1alpha1
kind: GPUCheckpoint
metadata:
  name: ckpt-vllm-001
  namespace: default
spec:
  podRef:
    namespace: default
    name: vllm-gcr-pod
    container: cuda-app
  storage:
    type: hostPath
    path: /var/lib/gcr-checkpoint
  period: "000000"        # one-shot; use "000300" for the paper's 3-min cadence
