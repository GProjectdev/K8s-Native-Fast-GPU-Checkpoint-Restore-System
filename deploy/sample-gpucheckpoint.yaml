# Checkpoint request for the sample GPU pod.
apiVersion: gpu-cr.io/v1alpha1
kind: GPUCheckpoint
metadata:
  name: ckpt-sample-001
  namespace: default
spec:
  workloadRef:
    kind: Pod
    namespace: default
    name: cuda-sample-pod
    container: cuda-app
  storage:
    type: hostPath
    path: /var/lib/gcr-checkpoint
    # For NFS the agent mounts the server export itself at runtime — no DaemonSet
    # volume needed. Set:
    #   type: nfs
    #   endpoint: 10.178.0.15      # NFS server
    #   path: /mnt/nfs             # exported path on the server
  schedule: ""          # one-shot; use "5m", "1h" etc. for periodic
