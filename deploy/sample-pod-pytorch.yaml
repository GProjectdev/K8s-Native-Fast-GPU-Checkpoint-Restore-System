# Driver-550-compatible GPU workload (use this instead of the vllm sample, whose
# vllm/vllm-openai:latest needs a newer CUDA/driver than 550). Full GCR wiring:
# interceptor + control channel + data-buffer storage.
apiVersion: v1
kind: Pod
metadata:
  name: cuda-gcr-pod
  namespace: default
  labels:
    app: cuda-gcr
spec:
  containers:
    - name: cuda-app
      image: pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime   # CUDA 12.1 → driver 550 OK
      command: ["python", "-c"]
      args:
        - |
          import torch, time
          assert torch.cuda.is_available(), "CUDA not available"
          x = torch.randn(2048, 2048, 256, device='cuda')   # ~4GB GPU memory
          print("GPU tensor allocated:", x.shape, "device:", x.device, flush=True)
          while True:
              time.sleep(3600)
      env:
        - name: LD_PRELOAD
          value: /opt/gpu-cr/libgcr-interceptor.so
        - name: GCR_HOME
          value: /opt/gpu-cr
        - name: GCR_POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: GCR_CONTROL_DIR
          value: /var/lib/gpu-cr/run
        - name: GCR_DATA_DIR
          value: /var/lib/gcr-checkpoint
      resources:
        limits:
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: gpu-cr-lib
          mountPath: /opt/gpu-cr
          readOnly: true
        - name: gpu-cr-run
          mountPath: /var/lib/gpu-cr/run
        - name: gcr-checkpoint
          mountPath: /var/lib/gcr-checkpoint
  volumes:
    - name: gpu-cr-lib
      hostPath:
        path: /var/lib/gpu-cr/lib
        type: Directory
    - name: gpu-cr-run
      hostPath:
        path: /var/lib/gpu-cr/run
        type: DirectoryOrCreate
    - name: gcr-checkpoint
      hostPath:
        path: /var/lib/gcr-checkpoint
        type: DirectoryOrCreate
