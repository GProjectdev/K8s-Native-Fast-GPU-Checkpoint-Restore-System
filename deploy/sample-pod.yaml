# Plain GPU workload for CRIUgpu checkpointing (no interceptor / no LD_PRELOAD).
# CRIU + the NVIDIA cuda_plugin checkpoint the GPU transparently.
apiVersion: v1
kind: Pod
metadata:
  name: cuda-sample-pod
  namespace: default
  labels:
    app: cuda-sample
spec:
  nodeSelector:
    nvidia.com/gpu.present: "true"
  containers:
    - name: cuda-app
      image: pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime
      command: ["python", "-c"]
      args:
        - |
          import torch, time
          assert torch.cuda.is_available(), "CUDA not available"
          x = torch.randn(2048, 2048, 256, device='cuda')   # ~4GB GPU memory
          print("GPU tensor allocated:", x.shape, "device:", x.device, flush=True)
          while True:
              time.sleep(3600)
      resources:
        limits:
          nvidia.com/gpu: "1"
