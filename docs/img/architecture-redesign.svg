<text class="t" x="672" y="404" text-anchor="middle" fill="#2c5320">Shared Storage</text>
<rect x="612" y="410" width="140" height="54" rx="5" fill="#B6D7A8" stroke="#6aa84f"/>
<text class="t" x="682" y="441" text-anchor="middle" fill="#254a17">Checkpoint.tar</text>

<line x1="640" y1="96" x2="646" y2="157" stroke="#555" marker-end="url(#m)"/>
