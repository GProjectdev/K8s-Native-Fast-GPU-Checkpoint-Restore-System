<marker id="md" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#96631a"/></marker>
<marker id="mg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3c7a28"/></marker></defs>
<rect x="6" y="6" width="768" height="488" rx="6" fill="none" stroke="#333"/>
<text class="h" x="16" y="24" fill="#222">Kubernetes Cluster</text>

<rect x="18" y="32" width="744" height="82" rx="5" fill="#F5F9FF" stroke="#9DB6E0"/>
