<rect x="540" y="50" width="200" height="46" rx="4" fill="#DCE6F5" stroke="#6f9bd1"/>
<text class="t" x="640" y="77" text-anchor="middle" fill="#1f3b63">GPUCheckpoint CR</text>

<rect x="18" y="124" width="744" height="364" rx="5" fill="#FCFCFC" stroke="#B7B7B7"/>
