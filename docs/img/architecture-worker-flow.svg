<text class="s" x="152" y="267" text-anchor="middle" fill="#7a5b00">VMM 소유: cudaMalloc→cuMemCreate/Map</text>
<text class="s" x="152" y="283" text-anchor="middle" fill="#7a5b00">freeze(D2H+물리해제) / remap(같은 VA)</text>

<rect x="34" y="330" width="236" height="46" rx="5" fill="#D9EAD3" stroke="#6aa84f"/>
