<text class="s" x="618" y="339" text-anchor="middle" fill="#8a5a00">＋추가 · 호스트 네이티브 실행</text>

<rect x="300" y="404" width="286" height="56" rx="5" fill="#ECECEC" stroke="#999" stroke-dasharray="4 3"/>
