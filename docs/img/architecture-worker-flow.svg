<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg">
<style>
.h{font-family:'Noto Sans CJK KR','DejaVu Sans',sans-serif;font-weight:700;font-size:13px}
.t{font-family:'Noto Sans CJK KR','DejaVu Sans',sans-serif;font-weight:700;font-size:12px}
.s{font-family:'Noto Sans CJK KR','DejaVu Sans',sans-serif;font-weight:400;font-size:10.5px}
.a{font-family:'Noto Sans CJK KR','DejaVu Sans',sans-serif;font-weight:400;font-size:10px;fill:#444}
</style>
<defs><marker id="m" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#555"/></marker>
<marker id="md" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8a5a00"/></marker>
<marker id="mg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3c7a28"/></marker></defs>
<rect x="6" y="6" width="748" height="488" rx="6" fill="none" stroke="#333"/>
<text class="h" x="16" y="24" fill="#222">Kubernetes Cluster</text>

<rect x="18" y="32" width="724" height="86" rx="5" fill="#F7FAFF" stroke="#9DB6E0"/>
<text class="t" x="28" y="50" fill="#33507a">Control Plane</text>
<rect x="500" y="52" width="210" height="48" rx="5" fill="#CFE2F3" stroke="#6f9bd1"/>
<text class="t" x="605" y="80" text-anchor="middle" fill="#1f3b63">GPUCheckpoint CR</text>

<rect x="18" y="128" width="724" height="360" rx="5" fill="#FBFBFB" stroke="#B7B7B7"/>
<text class="t" x="28" y="146" fill="#444">Worker Node</text>

<rect x="34" y="158" width="236" height="150" rx="5" fill="#FFFFFF" stroke="#8a8a8a"/>
