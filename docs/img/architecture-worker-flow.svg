<text class="s" x="443" y="443" text-anchor="middle" fill="#333">＋추가 · CPU only, cuda_plugin off</text>

<text class="t" x="672" y="398" text-anchor="middle" fill="#2c5320">Shared Storage</text>
<rect x="612" y="404" width="120" height="56" rx="5" fill="#B6D7A8" stroke="#6aa84f"/>
<text class="t" x="672" y="436" text-anchor="middle" fill="#254a17">Checkpoint.tar</text>

<line x1="605" y1="100" x2="618" y2="157" stroke="#555" marker-end="url(#m)"/>
