<line x1="272" y1="356" x2="300" y2="418" stroke="#3c7a28" stroke-dasharray="4 3" marker-end="url(#mg)"/>
<text class="a" x="238" y="392" fill="#2c5320">CRIU가 host 메모리 캡처</text>

<line x1="586" y1="432" x2="611" y2="432" stroke="#555" marker-end="url(#m)"/>
<text class="a" x="598" y="480">④ store (tar)</text>
