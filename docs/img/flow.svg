<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg">
<style>
.t{font-family:'Noto Sans CJK KR','DejaVu Sans',sans-serif;font-weight:700;font-size:12px}
.s{font-family:'Noto Sans CJK KR','DejaVu Sans',sans-serif;font-weight:400;font-size:10px}
.a{font-family:'Noto Sans CJK KR','DejaVu Sans',sans-serif;font-weight:400;font-size:9.5px;fill:#444}
</style>
<defs>
<marker id="m" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#555"/></marker>
<marker id="mg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3c7a28"/></marker></defs>
<rect x="6" y="6" width="748" height="456" rx="6" fill="none" stroke="#333"/>
<text class="t" x="16" y="24" fill="#222" style="font-size:13px">Kubernetes Cluster</text>

<rect x="18" y="32" width="744" height="80" rx="5" fill="#F5F9FF" stroke="#9DB6E0"/>
<text class="t" x="28" y="50" fill="#33507a">Control Plane</text>
<rect x="540" y="50" width="200" height="46" rx="4" fill="#DCE6F5" stroke="#6f9bd1"/>
<text class="t" x="640" y="78" text-anchor="middle" fill="#1f3b63">GPUCheckpoint CR</text>

<rect x="18" y="122" width="744" height="332" rx="5" fill="#FCFCFC" stroke="#B7B7B7"/>
<text class="t" x="28" y="140" fill="#444">Worker Node</text>

<rect x="34" y="156" width="236" height="150" rx="5" fill="#FFFFFF" stroke="#8a8a8a"/>
<text class="t" x="46" y="174" fill="#444">GPU Pod</text>
<rect x="48" y="182" width="208" height="32" rx="4" fill="#CFE2F3" stroke="#6f9bd1"/>
<text class="t" x="152" y="203" text-anchor="middle" fill="#1f3b63">GPU APP</text>
<rect x="48" y="222" width="208" height="76" rx="4" fill="#FFF2CC" stroke="#d6b656"/>
<text class="t" x="152" y="243" text-anchor="middle" fill="#7a5b00">GPU Selective Interceptor</text>
<text class="s" x="152" y="261" text-anchor="middle" fill="#7a5b00">VMM 소유 · 데이터만 (Selective Interception)</text>
<text class="s" x="152" y="277" text-anchor="middle" fill="#7a5b00">freeze(D2H+물리해제) / remap(같은 VA)</text>

<rect x="34" y="318" width="236" height="46" rx="5" fill="#D9EAD3" stroke="#6aa84f"/>
<text class="t" x="152" y="338" text-anchor="middle" fill="#2c5320">host memory (프로세스 내)</text>
<text class="s" x="152" y="354" text-anchor="middle" fill="#2c5320">GPU 데이터 (D2H 복사본)</text>

<rect x="520" y="156" width="222" height="58" rx="5" fill="#F9CB9C" stroke="#cc8b53"/>
<text class="t" x="631" y="180" text-anchor="middle" fill="#6b3e12">GPU C/R Node Agent</text>
<text class="s" x="631" y="197" text-anchor="middle" fill="#6b3e12">오케스트레이터 · 4단계 조율</text>

<rect x="298" y="388" width="326" height="58" rx="5" fill="#ECECEC" stroke="#999"/>
<text class="t" x="461" y="411" text-anchor="middle" fill="#333">kubelet · CRI-O · CRIU + cuda_plugin (CRIUgpu)</text>
<text class="s" x="461" y="430" text-anchor="middle" fill="#333">GPU control state(cuda_plugin) + CPU/host 데이터(CRIU) → tar</text>

<text class="t" x="690" y="382" text-anchor="middle" fill="#2c5320">Shared Storage</text>
<rect x="634" y="388" width="112" height="58" rx="5" fill="#B6D7A8" stroke="#6aa84f"/>
<text class="t" x="690" y="421" text-anchor="middle" fill="#254a17">Checkpoint.tar</text>

<line x1="605" y1="96" x2="631" y2="155" stroke="#555" marker-end="url(#m)"/>
<text class="a" x="641" y="126">Watch</text>

<line x1="520" y1="180" x2="257" y2="248" stroke="#555" marker-end="url(#m)"/>
<text class="a" x="298" y="212">① 데이터 freeze / ④ remap  (control 파일)</text>

<line x1="560" y1="214" x2="470" y2="387" stroke="#555" marker-end="url(#m)"/>
<text class="a" x="474" y="250" text-anchor="end">② checkpoint API</text>

<line x1="152" y1="298" x2="152" y2="317" stroke="#555" marker-end="url(#m)"/>
<text class="a" x="160" y="313">데이터 (D2H)</text>

<line x1="270" y1="350" x2="300" y2="408" stroke="#3c7a28" stroke-dasharray="4 3" marker-end="url(#mg)"/>
<text class="a" x="238" y="384" fill="#2c5320">CPU 덤프 시 캡처</text>

<line x1="624" y1="417" x2="633" y2="417" stroke="#555" marker-end="url(#m)"/>
<text class="a" x="590" y="462">③ store (tar)</text>
</svg>
